name: CI

# Run on pushes and pull requests to main (or master)
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # install Rust
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      # optionally cache cargo registry and git index
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Cargo check
        run: cargo check --all-features

      - name: Cargo build
        run: cargo build --all-features --verbose

      - name: Run tests
        run: cargo test --all-features --verbose

  coverage:
    name: Coverage
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      # cache the tarpaulin binary to avoid reinstalling every run
      - name: Cache tarpaulin
        uses: actions/cache@v3
        with:
          path: ~/.cargo/bin/cargo-tarpaulin
          key: ${{ runner.os }}-tarpaulin-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tarpaulin-

      - name: Install cargo-tarpaulin
        if: steps.cache-tarpaulin.outputs.cache-hit != 'true'
        run: cargo install cargo-tarpaulin

      - name: Run tarpaulin
        # Xml output is compatible with codecov and many other tools
        run: cargo tarpaulin --all-features --out Xml

      # archive the report as an artifact so it can be inspected
      - uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: tarpaulin-report.xml

      # optional: upload to Codecov; requires setting CODECOV_TOKEN secret
      - name: Upload coverage to Codecov
        if: secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v3
        with:
          files: tarpaulin-report.xml
          flags: unittests
