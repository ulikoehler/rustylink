  <!-- Matrix right bracket -->
  <path d="M 170 20 L 180 20 L 180 160 L 170 160" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Row 1 -->
