  <!-- Cell (0,1) - filled dark -->
  <rect x="82" y="25" width="36" height="36" rx="6" ry="6" fill="#333" stroke="#333" stroke-width="1.5"/>
  <!-- Cell (0,2) - filled dark -->
  <rect x="126" y="25" width="36" height="36" rx="6" ry="6" fill="#333" stroke="#333" stroke-width="1.5"/>

  <!-- Row 2 -->
  <!-- Cell (1,0) - empty (below diagonal) -->
  <rect x="38" y="69" width="36" height="36" rx="6" ry="6" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Cell (1,1) - filled dark -->
  <rect x="82" y="69" width="36" height="36" rx="6" ry="6" fill="#333" stroke="#333" stroke-width="1.5"/>
  <!-- Cell (1,2) - filled dark -->
  <rect x="126" y="69" width="36" height="36" rx="6" ry="6" fill="#333" stroke="#333" stroke-width="1.5"/>

  <!-- Row 3 -->
  <!-- Cell (2,0) - empty (below diagonal) -->
  <rect x="38" y="113" width="36" height="36" rx="6" ry="6" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
